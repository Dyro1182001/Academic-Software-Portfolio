<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto - Ingreso y Listado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="funciones.js"></script>
</head>

<body class="bg-light">

    <!-- Encabezado con logo y nombre de la empresa -->
    <header class="text-center mt-4 mb-2">
        <img src="imagenes/181-1819658_minutemen-logo-fallout-fallout-4-railroad-logo.png" alt="Logo Proyecto" class="logo mb-3">
        <h1 class="brand">Proyecto</h1>
    </header>

    <!-- Contenedor principal de la aplicación -->
    <div class="main-layout">

        <!-- Formulario de ingreso -->
        <div class="left-panel">
            <h2 class="section-title mb-3 text-center text-lg-start">Ingreso de datos</h2>
            <!-- Formulario de carga de datos -->
            <form id="formulario" novalidate>
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre *</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email *</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="mb-4">
                    <label for="telefono" class="form-label">Teléfono</label>
                    <input type="text" class="form-control" id="telefono" name="telefono">
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-send">Enviar</button>
            </form>

            <!-- Div para mensajes-->
            <div id="mensaje" class="mt-3"></div>
        </div>

        <!-- Divisor entre formulario y listado -->
        <div class="divider-v"></div>

        <!-- Listado de registros -->
        <div class="right-panel">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="section-title m-0">Listado de datos</h2>
                <small class="text-muted" id="metaListado"></small>
            </div>

            <div id="listado" class="vstack gap-3"></div>

            <!-- Paginador de datos -->
            <div class="d-flex justify-content-center align-items-center gap-2 mt-4" id="paginador"></div>
        </div>
    </div>
</body>

</html>
